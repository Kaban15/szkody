<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Strona nie znaleziona | Odszkodowania</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#111111',
                        'surface-light': '#1a1a1a',
                        gold: '#C8A45E',
                        'gold-light': '#E0C878',
                        muted: '#888888',
                        error: '#E05252',
                    },
                    fontFamily: {
                        heading: ['"Fraunces"', 'serif'],
                        body: ['"Space Grotesk"', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="font-body text-white bg-bg min-h-screen flex flex-col">

    <!-- Simplified Nav -->
    <nav class="py-5 px-4 sm:px-6 lg:px-8">

            </a>

    </nav>

    <main class="flex-1 flex items-center justify-center py-16">

            <h1 class="font-heading text-3xl font-bold text-white mb-4">Nie znaleźliśmy tej strony</h1>
            <p class="text-muted mb-10 max-w-md mx-auto">Strona, której szukasz, mogła zostać przeniesiona lub nie istnieje. Wróć na stronę główną lub skontaktuj się z nami.</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="/" class="bg-gold hover:bg-gold-light text-bg px-6 py-3 rounded font-semibold transition-colors">Wróć na stronę główną</a>
                <a href="kontakt.html" class="border border-gold text-gold hover:bg-gold hover:text-bg px-6 py-3 rounded font-semibold transition-colors">Skontaktuj się</a>

        </div>

    <script>lucide.createIcons();</script>
