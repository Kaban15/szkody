# Aider configuration generated by ai-toolkit
# Regenerate using: ai-toolkit install --local

# Use the architect mode for complex tasks, aligned with our 2-phase workflow
architect: true

# Read global rules 
read:
  - ".claude/CLAUDE.md"
  - ".claude/constitution.md"
  - "AGENTS.md"

# Linting commands for quality gates
lint-cmd:
  - "python: ruff check"
  - "typescript: npx eslint"
  - "javascript: npx eslint"
  - "php: ./vendor/bin/phpstan analyse"
  - "go: go vet"

# Model configuration
model: claude-sonnet-4-6
editor-model: claude-sonnet-4-6

# Auto-commit message formatting (matches our conventional commits)
commit_prompt: "Write a short, concise commit message following Conventional Commits (feat/fix/chore/docs/test/refactor)."

# Disable auto-commits if you prefer using the /commit slash skill explicitly
# auto-commits: false

